<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title> S&M Movies </title>
<style>
  body { font-family: Arial, sans-serif; direction: rtl; margin:0; padding:0; background:#f2f2f2; }
  header { background:#2c3e50; color:white; padding:20px; text-align:center; font-size:24px; }
  .container { padding:20px; }
  .movie { background:white; padding:15px; margin:10px 0; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
  .movie h3 { margin:0; }
  .movie p { margin:5px 0; }
  button { background:#2980b9; color:white; border:none; padding:10px 15px; border-radius:5px; cursor:pointer; }
  button:hover { background:#3498db; }
  #adminPanel { display:none; background:#ecf0f1; padding:20px; border-radius:8px; margin-top:20px; }
  input, textarea { width:100%; padding:8px; margin:5px 0 15px 0; border:1px solid #ccc; border-radius:5px; }
</style>
</head>
<body>

<header>تطبيق الأفلام التجريبي</header>

<div class="container">

  <button onclick="showAdminLogin()">لوحة المسؤول</button>

  <div id="adminLogin" style="display:none; margin-top:20px;">
    <input type="password" id="adminPassword" placeholder="أدخل رمز المسؤول">
    <button onclick="checkAdminPassword()">دخول</button>
  </div>

  <div id="adminPanel">
    <h2>لوحة الإدارة</h2>
    <input type="text" id="groupName" placeholder="اسم مجموعة الأفلام">
    <input type="text" id="movieName" placeholder="اسم الفيلم">
    <textarea id="movieDesc" placeholder="وصف الفيلم"></textarea>
    <input type="text" id="movieIMDB" placeholder="تقييم IMDb">
    <input type="text" id="movieLink" placeholder="رابط الفيلم أو الفيديو">
    <button onclick="addMovie()">إضافة الفيلم</button>
  </div>

  <h2>الأفلام</h2>
  <div id="moviesList"></div>

</div>

<script>
  const ADMIN_PASS = "1234"; // رمز المسؤول، غيره لأي شيء تبيه
  let movies = [];

  function showAdminLogin() {
    document.getElementById('adminLogin').style.display = 'block';
  }

  function checkAdminPassword() {
    const input = document.getElementById('adminPassword').value;
    if(input === ADMIN_PASS){
      document.getElementById('adminPanel').style.display = 'block';
      document.getElementById('adminLogin').style.display = 'none';
      alert('تم تسجيل الدخول بنجاح!');
    } else {
      alert('رمز غير صحيح!');
    }
  }

  function addMovie() {
    const group = document.getElementById('groupName').value || "عام";
    const name = document.getElementById('movieName').value;
    const desc = document.getElementById('movieDesc').value;
    const imdb = document.getElementById('movieIMDB').value;
    const link = document.getElementById('movieLink').value || "#";

    if(!name || !desc || !imdb) {
      alert('يرجى ملء جميع الحقول!');
      return;
    }

    movies.push({group, name, desc, imdb, link});
    renderMovies();
    clearAdminFields();
  }

  function renderMovies() {
    const container = document.getElementById('moviesList');
    container.innerHTML = "";
    movies.forEach((m, index) => {
      container.innerHTML += `
        <div class="movie">
          <h3>${m.name} (${m.group})</h3>
          <p>${m.desc}</p>
          <p>تقييم IMDb: ${m.imdb}</p>
          <button onclick="watchMovie(${index})">تشغيل الفيديو</button>
        </div>
      `;
    });
  }

  function watchMovie(index) {
    const m = movies[index];
    alert('هنا سيكون رابط الفيلم: ' + m.link);
    // لاحقاً تقدر تضيف iframe أو فيديو مباشر
  }

  function clearAdminFields() {
    document.getElementById('movieName').value = "";
    document.getElementById('movieDesc').value = "";
    document.getElementById('movieIMDB').value = "";
    document.getElementById('movieLink').value = "";
  }
</script>

</body>
</html>
